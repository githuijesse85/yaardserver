[build]
  # Directories mapped cleanly for Netlify's Linux environment
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  # Pins Node to match your updated package.json
  NODE_VERSION = "18"

[functions]
  # Faster and more reliable bundling for your API
  node_bundler = "esbuild"

[functions.admin]
  # Custom timeout for your admin processes (Requires Pro/Enterprise)
  timeout = 26 

# ==========================================
# ROUTING (REDIRECTS & REWRITES)
# ==========================================

# 1. API Catch-all
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# 2. Dedicated Admin Route
[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/admin"
  status = 200
  force = true

# 3. Frontend / SPA Fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ==========================================
# SECURITY HEADERS
# ==========================================

[[headers]]
  for = "/*"
  [headers.values]
    # Fixed: Combined into a single block with SAMEORIGIN
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

  [headers.values]
  X-Frame-Options = "SAMEORIGIN"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200
force = true

  [redirects.query]

  [redirects.conditions]

  [redirects.headers]

[[redirects]]
from = "/admin"
to = "/admin/"
status = 301
force = false

  [redirects.query]

  [redirects.conditions]

  [redirects.headers]

[[redirects]]
from = "/admin/"
to = "/admin/index.html"
status = 200
force = false

  [redirects.query]

  [redirects.conditions]

  [redirects.headers]

[[redirects]]
from = "/admin/*"
to = "/admin/index.html"
status = 200
force = false

  [redirects.query]

  [redirects.conditions]

  [redirects.headers]
