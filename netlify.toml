[build]
  # The directory containing your static assets
  publish = "public"
  
  # The directory containing your serverless functions
  functions = "netlify/functions"
  
  # Uncomment and set your build command if compiling code (e.g., TS to JS, or building a frontend)
  # command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[functions.admin]
  # Note: A 26-second timeout requires a Netlify Pro or Enterprise tier (default is 10s)
  timeout = 26 

# ==========================================
# ROUTING (REDIRECTS & REWRITES)
# ==========================================

# 1. API Catch-all Rewrite
# Maps requests from /api/myFunction to /.netlify/functions/myFunction
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# 2. Admin Panel - Static SPA Route
# Serves the admin panel from static files with client-side routing
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# 3. Frontend / SPA Fallback
# Passes unhandled URL routes to index.html so client-side routing takes over
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ==========================================
# SECURITY HEADERS
# ==========================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Uncomment if your mobile app needs to make cross-origin requests to this server
    # Access-Control-Allow-Origin = "*"
